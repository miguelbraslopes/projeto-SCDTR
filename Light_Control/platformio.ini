; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200
platform_packages =
    framework-arduinopico@https://github.com/earlephilhower/arduino-pico.git#master
build_flags = 
    -DBOARD_HAS_PSRAM=1
lib_ldf_mode = chain+

[env:pico_rpi1]
extends = env:pico
; Stable mapping by USB ID (recommended)
upload_port = /dev/serial/by-id/usb-Raspberry_Pi_Pico_E66118604B886021-if00
monitor_port = /dev/serial/by-id/usb-Raspberry_Pi_Pico_E66118604B886021-if00
build_flags =
    ${env:pico.build_flags}
    -Drpi1
    -DB_VALUE=6.10

[env:pico_rpi2]
extends = env:pico
upload_port = /dev/serial/by-id/usb-Raspberry_Pi_Pico_E66118604B497921-if00
monitor_port = /dev/serial/by-id/usb-Raspberry_Pi_Pico_E66118604B497921-if00
build_flags =
    ${env:pico.build_flags}
    -Drpi2